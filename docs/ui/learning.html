<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背单词学习界面</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-morphism {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .quiz-card {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .correct-answer {
            background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
        }
        
        .incorrect-answer {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
        }
        
        .matching-item {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .matching-item:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.9);
        }
        
        .matching-item.selected {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
            transform: scale(1.05);
        }
        
        .progress-bar {
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="p-4">
    <div class="container mx-auto max-w-6xl">
        <!-- Header -->
        <header class="glass-morphism rounded-2xl p-6 mb-6 text-white animate-fade-in">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold mb-2">背单词学习系统</h1>
                    <p class="text-white/80">使用莱特纳盒子算法优化学习效率</p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-white/60">学习进度</p>
                    <p class="text-2xl font-bold"><span id="currentQuestion">1</span> / <span id="totalQuestions">10</span></p>
                </div>
            </div>
            
            <!-- Progress Bar -->
            <div class="mt-4 w-full bg-white/20 rounded-full h-2">
                <div id="progressBar" class="progress-bar bg-white h-2 rounded-full" style="width: 10%"></div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="mainContent" class="quiz-card p-8 animate-fade-in">
            <!-- Quiz Container -->
            <div id="quizContainer">
                <!-- Content will be dynamically inserted here -->
            </div>
        </main>

        <!-- Results Container (Initially Hidden) -->
        <div id="resultsContainer" class="quiz-card p-8 animate-fade-in hidden">
            <!-- Results will be dynamically inserted here -->
        </div>

        <!-- Footer -->
        <footer class="glass-morphism rounded-2xl p-4 mt-6 text-white text-center">
            <p class="text-sm">莱特纳盒子记忆算法 · 智能复习计划</p>
        </footer>
    </div>

    <script>
        class WebQuizRenderer {
            constructor() {
                this.currentQuiz = null;
                this.currentQuestion = 0;
                this.userAnswers = [];
                this.matchingSelections = { chinese: null, english: null };
                this.matchingPairs = [];
            }

            renderQuiz(quiz) {
                this.currentQuiz = quiz;
                this.currentQuestion = 0;
                this.userAnswers = [];
                
                document.getElementById('totalQuestions').textContent = quiz.questions.length;
                document.getElementById('currentQuestion').textContent = 1;
                document.querySelector('.progress-bar').style.width = `${(100 / quiz.questions.length)}%`;
                
                this.renderCurrentQuestion();
            }

            renderCurrentQuestion() {
                const container = document.getElementById('quizContainer');
                const quiz = this.currentQuiz;
                const question = quiz.questions[this.currentQuestion];
                
                if (quiz.type === 'matching') {
                    container.innerHTML = this.renderMatchingQuiz(quiz, question);
                } else if (quiz.type === 'fill-in') {
                    container.innerHTML = this.renderFillInQuiz(quiz, question);
                } else if (quiz.type === 'translation') {
                    container.innerHTML = this.renderTranslationQuiz(quiz, question);
                }
                
                // Add event listeners
                this.attachEventListeners();
            }

            renderMatchingQuiz(quiz, question) {
                return `
                    <div class="text-center">
                        <h2 class="text-2xl font-bold mb-6 text-gray-800">单词配对题</h2>
                        <p class="text-gray-600 mb-8">将左边的中文与右边的英文进行配对</p>
                        
                        <div class="grid grid-cols-2 gap-8 max-w-4xl mx-auto">
                            <!-- Chinese Column -->
                            <div>
                                <h3 class="text-lg font-semibold mb-4 text-gray-700">中文</h3>
                                <div class="space-y-3">
                                    ${question.chineseOptions.map((text, index) => `
                                        <div class="matching-item p-4 bg-gray-100 rounded-lg font-medium text-gray-800" 
                                             data-type="chinese" data-index="${index}">
                                            ${text}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <!-- English Column -->
                            <div>
                                <h3 class="text-lg font-semibold mb-4 text-gray-700">英文</h3>
                                <div class="space-y-3">
                                    ${question.englishOptions.map((text, index) => `
                                        <div class="matching-item p-4 bg-gray-100 rounded-lg font-medium text-gray-800" 
                                             data-type="english" data-index="${index}">
                                            ${text}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-8">
                            <button onclick="quizRenderer.checkMatchingAnswer()" class="btn-primary text-white px-8 py-3 rounded-lg font-semibold">
                                检查答案
                            </button>
                        </div>
                        
                        <div id="matchingFeedback" class="mt-4"></div>
                    </div>
                `;
            }

            renderFillInQuiz(quiz, question) {
                return `
                    <div class="text-center max-w-2xl mx-auto">
                        <h2 class="text-2xl font-bold mb-6 text-gray-800">填空题</h2>
                        <p class="text-gray-600 mb-8">根据中文释义和字母提示填写完整英文单词</p>
                        
                        <div class="bg-gradient-to-r from-purple-50 to-pink-50 p-8 rounded-xl mb-6">
                            <p class="text-xl font-medium text-gray-700 mb-4">中文释义</p>
                            <p class="text-2xl font-bold text-purple-600 mb-6">${question.chinese}</p>
                            
                            <p class="text-lg text-gray-600 mb-4">字母提示</p>
                            <p class="text-3xl font-mono font-bold text-purple-700 tracking-wider">${question.hint}</p>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-lg font-medium text-gray-700 mb-2">你的答案</label>
                            <input type="text" id="userAnswer" 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-purple-500 focus:outline-none text-lg"
                                   placeholder="请输入英文单词...">
                        </div>
                        
                        <button onclick="quizRenderer.submitFillInAnswer()" class="btn-primary text-white px-8 py-3 rounded-lg font-semibold">
                            提交答案
                        </button>
                        
                        <div id="fillFeedback" class="mt-4"></div>
                    </div>
                `;
            }

            renderTranslationQuiz(quiz, question) {
                return `
                    <div class="text-center max-w-2xl mx-auto">
                        <h2 class="text-2xl font-bold mb-6 text-gray-800">翻译题</h2>
                        <p class="text-gray-600 mb-8">请将下列英文单词翻译成中文</p>
                        
                        <div class="bg-gradient-to-r from-blue-50 to-indigo-50 p-8 rounded-xl mb-6">
                            <p class="text-lg text-gray-600 mb-4">英文单词</p>
                            <p class="text-4xl font-bold text-indigo-600">${question.english}</p>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-lg font-medium text-gray-700 mb-2">中文翻译</label>
                            <input type="text" id="userAnswer" 
                                   class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none text-lg"
                                   placeholder="请输入中文翻译...">
                        </div>
                        
                        <button onclick="quizRenderer.submitTranslationAnswer()" class="btn-primary text-white px-8 py-3 rounded-lg font-semibold">
                            提交答案
                        </button>
                        
                        <div id="translationFeedback" class="mt-4"></div>
                    </div>
                `;
            }

            attachEventListeners() {
                // Handle matching quiz item clicks
                document.querySelectorAll('.matching-item').forEach(item => {
                    item.addEventListener('click', (e) => this.handleMatchingClick(e));
                });

                // Handle enter key submission
                const answerInput = document.getElementById('userAnswer');
                if (answerInput) {
                    answerInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') {
                            if (this.currentQuiz.type === 'fill-in') {
                                this.submitFillInAnswer();
                            } else if (this.currentQuiz.type === 'translation') {
                                this.submitTranslationAnswer();
                            }
                        }
                    });
                }
            }

            handleMatchingClick(e) {
                const item = e.target;
                const type = item.dataset.type;
                const index = parseInt(item.dataset.index);

                // Remove previous selection in the same column
                document.querySelectorAll(`.matching-item[data-type="${type}"]`).forEach(el => {
                    el.classList.remove('selected');
                });

                // Add selection to clicked item
                item.classList.add('selected');

                // Update selections
                this.matchingSelections[type] = index;
            }

            checkMatchingAnswer() {
                const question = this.currentQuiz.questions[0];
                const { chinese, english } = this.matchingSelections;
                
                if (chinese === null || english === null) {
                    this.showFeedback('matchingFeedback', '请先选择要配对的项目', 'warning');
                    return;
                }

                const isCorrect = question.answerKey[chinese] === english;
                this.recordAnswer(isCorrect, question.answerKey[chinese], english);
                
                if (isCorrect) {
                    this.showFeedback('matchingFeedback', '回答正确！', 'success');
                    setTimeout(() => this.nextQuestion(), 1500);
                } else {
                    this.showFeedback('matchingFeedback', '回答错误，请重新选择', 'error');
                    this.matchingSelections = { chinese: null, english: null };
                    document.querySelectorAll('.matching-item').forEach(el => {
                        el.classList.remove('selected');
                    });
                }
            }

            submitFillInAnswer() {
                const userAnswer = document.getElementById('userAnswer').value.trim();
                const question = this.currentQuiz.questions[this.currentQuestion];
                
                if (!userAnswer) {
                    this.showFeedback('fillFeedback', '请输入答案', 'warning');
                    return;
                }

                const isCorrect = userAnswer.toLowerCase() === question.answer.toLowerCase();
                this.recordAnswer(isCorrect, question.answer, userAnswer);
                
                if (isCorrect) {
                    this.showFeedback('fillFeedback', '回答正确！', 'success');
                    setTimeout(() => this.nextQuestion(), 1500);
                } else {
                    this.showFeedback('fillFeedback', `回答错误！正确答案是: ${question.fullWord}`, 'error');
                    setTimeout(() => this.nextQuestion(), 3000);
                }
            }

            submitTranslationAnswer() {
                const userAnswer = document.getElementById('userAnswer').value.trim();
                const question = this.currentQuiz.questions[this.currentQuestion];
                
                if (!userAnswer) {
                    this.showFeedback('translationFeedback', '请输入答案', 'warning');
                    return;
                }

                // For demo purposes, we'll simulate semantic matching
                const isCorrect = this.evaluateTranslation(userAnswer, question.answer);
                this.recordAnswer(isCorrect, question.answer, userAnswer);
                
                if (isCorrect) {
                    this.showFeedback('translationFeedback', '回答正确！', 'success');
                    setTimeout(() => this.nextQuestion(), 1500);
                } else {
                    this.showFeedback('translationFeedback', `回答错误！正确答案是: ${question.answer}`, 'error');
                    setTimeout(() => this.nextQuestion(), 3000);
                }
            }

            evaluateTranslation(userAnswer, correctAnswer) {
                // Simple semantic matching (in real app, this would call the evaluateAnswer method)
                const synonymMap = {
                    '点心': ['零食', '小食', '小吃', '甜点', '糕点'],
                    '零食': ['点心', '小食', '小吃'],
                    '电脑': ['计算机', '电脑设备'],
                    '手机': ['移动电话', '移动设备'],
                    '汽车': ['车', '轿车', '车辆']
                };

                if (userAnswer === correctAnswer) return true;
                
                const userLower = userAnswer.toLowerCase();
                const correctLower = correctAnswer.toLowerCase();
                
                if (synonymMap[correctLower] && synonymMap[correctLower].includes(userLower)) {
                    return true;
                }
                
                if (synonymMap[userLower] && synonymMap[userLower].includes(correctLower)) {
                    return true;
                }
                
                return false;
            }

            recordAnswer(correct, correctAnswer, userAnswer) {
                this.userAnswers.push({
                    answer: userAnswer,
                    correctAnswer: correctAnswer,
                    correct: correct
                });
            }

            showFeedback(elementId, message, type) {
                const feedback = document.getElementById(elementId);
                const bgColor = type === 'success' ? 'bg-green-100 text-green-800 border-green-300' :
                              type === 'error' ? 'bg-red-100 text-red-800 border-red-300' :
                              'bg-yellow-100 text-yellow-800 border-yellow-300';
                
                feedback.innerHTML = `
                    <div class="p-4 rounded-lg border ${bgColor}">
                        <p class="font-medium">${message}</p>
                    </div>
                `;
            }

            nextQuestion() {
                this.currentQuestion++;
                
                if (this.currentQuestion >= this.currentQuiz.questions.length) {
                    this.showResults();
                } else {
                    document.getElementById('currentQuestion').textContent = this.currentQuestion + 1;
                    document.querySelector('.progress-bar').style.width = `${((this.currentQuestion + 1) / this.currentQuiz.questions.length) * 100}%`;
                    this.renderCurrentQuestion();
                }
            }

            showResults() {
                const container = document.getElementById('quizContainer');
                const resultsContainer = document.getElementById('resultsContainer');
                
                container.classList.add('hidden');
                resultsContainer.classList.remove('hidden');
                
                const correctCount = this.userAnswers.filter(a => a.correct).length;
                const totalCount = this.userAnswers.length;
                const percentage = Math.round((correctCount / totalCount) * 100);
                
                resultsContainer.innerHTML = `
                    <div class="text-center">
                        <h2 class="text-3xl font-bold mb-6 text-gray-800">学习完成！</h2>
                        
                        <div class="mb-8">
                            <div class="text-6xl font-bold mb-2 ${percentage >= 80 ? 'text-green-600' : percentage >= 60 ? 'text-yellow-600' : 'text-red-600'}">
                                ${percentage}%
                            </div>
                            <p class="text-xl text-gray-600">正确率</p>
                            <p class="text-lg text-gray-500 mt-2">${correctCount} / ${totalCount} 题正确</p>
                        </div>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-semibold mb-4 text-gray-700">答题详情</h3>
                            <div class="space-y-2 max-h-64 overflow-y-auto">
                                ${this.userAnswers.map((answer, index) => `
                                    <div class="flex items-center justify-between p-3 rounded-lg ${answer.correct ? 'bg-green-50' : 'bg-red-50'}">
                                        <span class="font-medium">题目 ${index + 1}</span>
                                        <div class="text-right">
                                            <div class="text-sm ${answer.correct ? 'text-green-600' : 'text-red-600'}">
                                                ${answer.correct ? '正确' : '错误'}
                                            </div>
                                            ${!answer.correct ? `<div class="text-xs text-gray-600">正确: ${answer.correctAnswer}</div>` : ''}
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="flex gap-4 justify-center">
                            <button onclick="location.reload()" class="btn-primary text-white px-6 py-3 rounded-lg font-semibold">
                                再次学习
                            </button>
                            <button onclick="window.location.href='statistics.html'" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-lg font-semibold transition">
                                查看统计
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        // Global instance
        const quizRenderer = new WebQuizRenderer();

        // Sample quiz data for demonstration
        const sampleQuiz = {
            type: 'translation',
            title: '翻译题',
            questions: [
                { english: 'apple', answer: '苹果' },
                { english: 'book', answer: '书' },
                { english: 'water', answer: '水' },
                { english: 'computer', answer: '电脑' },
                { english: 'snack', answer: '点心' }
            ]
        };

        // Initialize with sample quiz
        window.addEventListener('DOMContentLoaded', () => {
            quizRenderer.renderQuiz(sampleQuiz);
        });
    </script>
</body>
</html>
